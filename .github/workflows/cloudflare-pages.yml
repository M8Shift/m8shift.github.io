name: Deploy VitePress site to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history keeps VitePress lastUpdated / sitemap <lastmod> accurate.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run docs:build
        env:
          M8SHIFT_SITE_URL: ${{ vars.M8SHIFT_SITE_URL || 'https://m8shift.ai' }}
          M8SHIFT_COOKIEYES_CLIENT_DATA_ID: ${{ vars.M8SHIFT_COOKIEYES_CLIENT_DATA_ID || '62897b62030c6fecabf8f3ba3f6db80e' }}
          M8SHIFT_GA_MEASUREMENT_ID: ${{ vars.M8SHIFT_GA_MEASUREMENT_ID || 'G-NH0MHKS21Y' }}

      - name: Check Cloudflare credentials
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN secret" >&2; exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID secret" >&2; exit 1)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.vitepress/dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'm8shift-site' }} --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
